<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subsurfs-inspired - Clone simples (texto original)</title>
  <style>
    :root {
      --bg: #111;
      --fg: #fff;
      --panel: #1e1e1e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0a0a0a;
      color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .game-wrap {
      width: min(100%, 900px);
      aspect-ratio: 16 / 9;
      background: #000;
      border: 2px solid #333;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #222;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ctrl {
      padding: 12px 16px;
      font-size: 16px;
      border-radius: 8px;
      border: 0;
      background: #1e1e1e;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }
    .ctrl:active { transform: scale(0.98); }
    @media (max-width: 520px) {
      .ctrl { padding: 10px 12px; font-size: 14px; }
    }
    .note {
      font-size: 12px;
      color: #aaa;
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <div class="game-wrap" aria-label="Jogo simples inspirado em subsurfs">
    <canvas id="gameCanvas" width="960" height="540"></canvas>
  </div>

  <div class="controls" aria-label="Controles de toque">
    <button class="ctrl" id="btnLeft"  aria-label="Mover para a esquerda">◀</button>
    <button class="ctrl" id="btnJump"  aria-label="Pular">▲</button>
    <button class="ctrl" id="btnCrouch" aria-label="Agachar">▾</button>
    <button class="ctrl" id="btnRight" aria-label="Mover para a direita">▶</button>
  </div>

  <div class="note" style="text-align:center; max-width:800px;">
    Observação: este é um protótipo original com texturas geradas. Troque as texturas e ajuste as mecânicas conforme necessário.
  </div>

  <script>
  (function(){
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    // Texturas procedurais (cria canvases que viram patterns)
    function genTexture(type){
      const c = document.createElement('canvas');
      c.width = 128; c.height = 128;
      const g = c.getContext('2d');

      if(type === 'ground'){
        // gradiente verde
        const gr = g.createLinearGradient(0,0,0,128);
        gr.addColorStop(0, '#4CAF50');
        gr.addColorStop(1, '#2E7D32');
        g.fillStyle = gr; g.fillRect(0,0,128,128);
        // linhas suaves para textura
        g.strokeStyle = 'rgba(0,0,0,0.15)';
        for(let x=0; x<128; x+=16){
          g.beginPath();
          g.moveTo(x,128);
          g.lineTo(x+8,80);
          g.lineTo(x+16,128);
          g.stroke();
        }
      } else if(type === 'rock'){
        // rocha cinza
        g.fillStyle = '#888';
        g.fillRect(0,0,128,128);
        g.fillStyle = 'rgba(0,0,0,0.08)';
        for(let i=0;i<400;i++){
          g.fillRect(Math.random()*128, Math.random()*128, 1, 1);
        }
      } else if(type === 'sand'){
        // areia clara com granulado
        g.fillStyle = '#C2B280';
        g.fillRect(0,0,128,128);
        g.fillStyle = 'rgba(0,0,0,0.05)';
        for(let i=0;i<800;i++){
          g.fillRect(Math.random()*128, Math.random()*128, 1, 1);
        }
      } else {
        // padrão simples por padrão
        g.fillStyle = '#AAAAAA';
        g.fillRect(0,0,128,128);
        g.fillStyle = 'rgba(0,0,0,0.08)';
        for(let i=0;i<64;i++){
          g.fillRect(i*2, (i*3)%128, 2, 2);
        }
      }

      return c;
    }

    // Texturas carregadas (uma cada tipo)
    const textures = {
      ground: genTexture('ground'),
      rock: genTexture('rock'),
      sand: genTexture('sand')
    };

    // Mundo do jogo
    const gravity = 0.6;
    const groundY = H - 20;

    const player = {
      x: 120, y: groundY - 70, w: 50, h: 70,
      vy: 0, onGround: true, crouch: false
    };

    const keys = { left:false, right:false, up:false, down:false };
    const obstacles = [];
    let spawnTimer = 0;

    // Controles de toque
    function setupTouchControls(){
      document.getElementById('btnLeft').addEventListener('pointerdown', ()=>keys.left = true);
      document.getElementById('btnLeft').addEventListener('pointerup',   ()=>keys.left = false);
      document.getElementById('btnRight').addEventListener('pointerdown', ()=>keys.right = true);
      document.getElementById('btnRight').addEventListener('pointerup',   ()=>keys.right = false);
      document.getElementById('btnJump').addEventListener('pointerdown', ()=>{
        if(player.onGround){ player.vy = -12; player.onGround = false; }
      });
      document.getElementById('btnCrouch').addEventListener('pointerdown', ()=>{ keys.down = true; });
      document.getElementById('btnCrouch').addEventListener('pointerup',   ()=>{ keys.down = false; });
    }

    // spawnar obstáculo
    function spawnObstacle(){
      const w = 40 + Math.random()*40;
      const h = 20 + Math.random()*40;
      obstacles.push({ x: W + 50, y: groundY - h, w, h, passed:false });
    }

    // atualiza lógica do jogo
    function update(){
      // input básico de movimento
      if(keys.left)  player.x -= 4;
      if(keys.right) player.x += 4;
      if((keys.up) && player.onGround){
        player.vy = -12;
        player.onGround = false;
      }
      if(keys.down){ player.crouch = true; player.h = 50; } else { player.crouch = false; player.h = 70; }

      // gravidade
      player.vy += gravity;
      player.y += player.vy;

      // chão
      if(player.y + player.h >= groundY){
        player.y = groundY - player.h;
        player.vy = 0;
        player.onGround = true;
      }

      // obstáculos
      for(let ob of obstacles){
        ob.x -= 3; // velocidade de movimento dos obstáculos
      }
      // limpar fora da tela
      while(obstacles.length && obstacles[0].x + obstacles[0].w < -20) obstacles.shift();

      // spawn
      spawnTimer++;
      if(spawnTimer > 90){
        spawnObstacle();
        spawnTimer = 0;
      }

      // limites horizontais
      if(player.x < 0) player.x = 0;
      if(player.x > W - player.w) player.x = W - player.w;
    }

    // desenha tudo
    function draw(){
      // fundo
      const sky = ctx.createLinearGradient(0,0,0,H);
      sky.addColorStop(0, '#87CEEB');
      sky.addColorStop(1, '#bfe6ff');
      ctx.fillStyle = sky;
      ctx.fillRect(0,0,W,H);

      // colinas/efeito distante (simples)
      ctx.fillStyle = '#6bd';
      ctx.fillRect(0, H*0.6, W, H*0.4);

      // chão com textura
      const patGround = ctx.createPattern(textures.ground, 'repeat');
      ctx.fillStyle = patGround;
      ctx.fillRect(0, groundY, W, H - groundY);

      // obstáculos (com leve detalhamento)
      for(let ob of obstacles){
        ctx.fillStyle = '#555';
        ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
        // textura sutil no obstáculo
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
      }

      // jogador (uso de textura para "textoural")
      ctx.save();
      const ptex = ctx.createPattern(keys.down ? textures.rock : textures.sand, 'repeat');
      ctx.fillStyle = ptex;
      ctx.fillRect(player.x, player.y, player.w, player.h);
      ctx.restore();

      // HUD simples
      ctx.fillStyle = '#000';
      ctx.font = '12px sans-serif';
      ctx.fillText('Controles: setas/espaço = andar/pular; ↓ = agachar', 10, 18);
    }

    // loop principal
    function loop(){
      update();
      draw();
      requestAnimationFrame(loop);
    }

    // Eventos de teclado
    window.addEventListener('keydown', (e) => {
      if(e.key === 'ArrowLeft')  keys.left = true;
      if(e.key === 'ArrowRight') keys.right = true;
      if(e.key === 'ArrowUp' || e.key === ' ') { if (player.onGround) { player.vy = -12; player.onGround = false; } }
      if(e.key === 'ArrowDown') keys.down = true;
    });
    window.addEventListener('keyup', (e) => {
      if(e.key === 'ArrowLeft')  keys.left = false;
      if(e.key === 'ArrowRight') keys.right = false;
      if(e.key === 'ArrowDown') keys.down = false;
    });

    // inicializar controles de toque
    setupTouchControls();

    // iniciar jogo
    spawnObstacle();
    loop();

  })();
  </script>
</body>
</html>
