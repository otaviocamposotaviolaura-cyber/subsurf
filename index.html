<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>SubSurf Clone</title>
  <style>
    body { margin: 0; overflow: hidden; background: #222; }
    canvas { display: block; margin: auto; background: #444; }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 600;

let player = { x: 180, y: 500, w: 40, h: 40, lane: 1 };
let lanes = [100, 180, 260];
let obstacles = [];
let speed = 4;
let gameOver = false;

function spawnObstacle() {
  let lane = Math.floor(Math.random() * 3);
  obstacles.push({ x: lanes[lane], y: -40, w: 40, h: 40 });
}

setInterval(spawnObstacle, 1200);

function update() {
  if (gameOver) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // player
  ctx.fillStyle = "#00ffcc";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // obstacles
  ctx.fillStyle = "#ff4444";
  for (let i = 0; i < obstacles.length; i++) {
    let o = obstacles[i];
    o.y += speed;
    ctx.fillRect(o.x, o.y, o.w, o.h);

    // collision
    if (
      player.x < o.x + o.w &&
      player.x + player.w > o.x &&
      player.y < o.y + o.h &&
      player.y + player.h > o.y
    ) {
      gameOver = true;
      alert("Perdeu. Parabéns pela performance questionável.");
      location.reload();
    }
  }

  requestAnimationFrame(update);
}

update();

// controls
window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft" && player.lane > 0) {
    player.lane--;
  }
  if (e.key === "ArrowRight" && player.lane < 2) {
    player.lane++;
  }
  player.x = lanes[player.lane];
});
</script>
</body>
</html>
